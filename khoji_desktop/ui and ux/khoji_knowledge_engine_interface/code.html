<style>
        body {
            background-color: #121319;
            overflow: hidden;
            margin: 0;
            padding: 0;
        }

        .tech-grid {
            background-image: 
                linear-gradient(to right, rgba(144, 143, 158, 0.05) 1px, transparent 1px),

<!-- Main Splash Canvas -->

<script>
        // Micro-interactions for status text
        const statusLines = [
            "Syncing Knowledge Graph",
            "Allocating Local VRAM",
            "Warming Neural Weights",
            "Optimizing Search Index",
            "Verifying Local Keys",
            "Readying Document Parser"
        ];
        
        let currentIndex = 0;
        const statusElement = document.getElementById('loading-step');
        const percentElement = document.getElementById('loading-percent');
        
        setInterval(() => {
            currentIndex = (currentIndex + 1) % statusLines.length;
            statusElement.style.opacity = 0;
            
            setTimeout(() => {
                statusElement.textContent = statusLines[currentIndex];
                statusElement.style.opacity = 1;
                
                // Randomize percent text loosely matching the bar's rhythm
                const randomPct = Math.floor(Math.random() * 99) + 1;
                percentElement.textContent = randomPct + '%';
            }, 300);
            
        }, 2000);

        // Transition logic for status element
        statusElement.style.transition = 'opacity 0.3s ease';
    </script>
