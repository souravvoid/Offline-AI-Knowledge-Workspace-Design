<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width,initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }
  </style>
</head>
<body>
<!-- STITCH_SVG_START:ANIMATION_16 class="fixed inset-0 w-full h-full" --><div class="fixed inset-0 w-full h-full" id="animated-svg-ANIMATION_16" style="display:block;"><svg viewbox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
<defs>
<lineargradient id="g" x1="0%" x2="100%" y1="0%" y2="100%">
<stop offset="0%" style="stop-color:#818cf8;stop-opacity:1"></stop>
<stop offset="100%" style="stop-color:#6366f1;stop-opacity:1"></stop>
</lineargradient>

<rect fill="none" height="60" rx="8" stroke="url(#g)" stroke-width="2" width="60" x="20" y="20">

<circle cx="50" cy="50" fill="url(#g)" r="10">
<animate attributename="r" dur="3s" repeatcount="indefinite" values="8;12;8"></animate>
<animate attributename="opacity" dur="3s" repeatcount="indefinite" values="0.6;1;0.6"></animate>
</circle>
<!-- Connection Lines -->
<line stroke="url(#g)" stroke-linecap="round" stroke-width="1.5" x1="35" x2="43" y1="35" y2="43">
<animate attributename="opacity" dur="2s" repeatcount="indefinite" values="0;1;0"></animate>
</line>
<line stroke="url(#g)" stroke-linecap="round" stroke-width="1.5" x1="65" x2="57" y1="65" y2="57">
<animate attributename="opacity" begin="0.5s" dur="2s" repeatcount="indefinite" values="0;1;0"></animate>
</line>
</svg></div><!-- STITCH_SVG_END:ANIMATION_16 -->
</body>
</html>
